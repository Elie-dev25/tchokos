<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Catalogue — Tchokos SARL</title>
  <link rel="stylesheet" href="../css/style.css">
  <link rel="icon" type="image/jpeg" href="../images/logo.jpg">
  <style>
    .subcat-tabs { display:flex; gap:0.4rem; flex-wrap:wrap; justify-content:center; margin-bottom:0.75rem; }
    .subcat-btn  { background:transparent; border:1px solid var(--border); color:var(--muted);
                   padding:5px 14px; border-radius:20px; font-size:12px; transition:var(--transition); }
    .subcat-btn.active, .subcat-btn:hover { background:var(--red); color:white; border-color:var(--red); }
    #result-count { text-align:center; font-size:13px; color:var(--muted); margin-bottom:2rem; }
    .no-results { text-align:center; padding:4rem 1rem; color:var(--muted); }
    .no-results h3 { font-size:1.1rem; margin-bottom:0.5rem; }
  </style>
</head>
<body>

<div id="navbar"></div>

<!-- BANNER -->
<div class="page-banner">
  <div class="container">
    <h1>Notre Catalogue</h1>
    <p>Tous nos produits disponibles — gros et détail</p>
  </div>
</div>

<!-- CATALOGUE -->
<section class="section">
  <div class="container">
    <!-- Filtres catégories -->
    <div class="filter-bar" id="cat-filters">
      <button class="filter-btn active" data-cat="tous" onclick="setCat('tous', this)">Tous</button>
      <button class="filter-btn" data-cat="chaussures-femme" onclick="setCat('chaussures-femme', this)">Chaussures Femme</button>
      <button class="filter-btn" data-cat="chaussures-homme" onclick="setCat('chaussures-homme', this)">Chaussures Homme</button>
      <button class="filter-btn" data-cat="textile" onclick="setCat('textile', this)">Textile</button>
      <button class="filter-btn" data-cat="electromenager" onclick="setCat('electromenager', this)">Électroménager</button>
      <button class="filter-btn" data-cat="maison" onclick="setCat('maison', this)">Maison & Déco</button>
      <button class="filter-btn" data-cat="parfums" onclick="setCat('parfums', this)">Parfums</button>
    </div>

    <!-- Sous-catégories dynamiques -->
    <div class="subcat-tabs" id="subcat-filters"></div>

    <!-- Compteur résultats -->
    <div id="result-count"></div>

    <!-- Grille produits -->
    <div class="products-grid" id="products-grid"></div>
  </div>
</section>

<div id="footer"></div>

<script src="../js/products.js"></script>
<script src="../js/cart.js"></script>
<script src="../js/components.js"></script>
<script>
  let currentCat = 'tous';
  let currentSubcat = 'tous';

  document.addEventListener('DOMContentLoaded', () => {
    injectComponents('catalogue');

    // Lire le paramètre URL ?cat=...
    const params = new URLSearchParams(window.location.search);
    const catParam = params.get('cat');
    if (catParam) {
      const btn = document.querySelector(`[data-cat="${catParam}"]`);
      if (btn) setCat(catParam, btn);
    } else {
      render();
    }
  });

  function setCat(cat, btn) {
    currentCat = cat;
    currentSubcat = 'tous';
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    renderSubcats();
    render();
  }

  function renderSubcats() {
    const container = document.getElementById('subcat-filters');
    if (currentCat === 'tous') { container.innerHTML = ''; return; }

    const catDef = CATEGORIES.find(c => c.id === currentCat);
    if (!catDef) { container.innerHTML = ''; return; }

    container.innerHTML = `
      <button class="subcat-btn active" onclick="setSubcat('tous', this)">Toutes</button>
      ${catDef.subcats.map(s => `
        <button class="subcat-btn" onclick="setSubcat('${s}', this)">${s}</button>
      `).join('')}
    `;
  }

  function setSubcat(subcat, btn) {
    currentSubcat = subcat;
    document.querySelectorAll('.subcat-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    render();
  }

  function render() {
    let products = getProductsByCategory(currentCat);
    if (currentSubcat !== 'tous') {
      products = products.filter(p => p.subcat === currentSubcat);
    }

    const count = document.getElementById('result-count');
    count.textContent = `${products.length} produit${products.length > 1 ? 's' : ''} trouvé${products.length > 1 ? 's' : ''}`;

    const grid = document.getElementById('products-grid');
    if (products.length === 0) {
      grid.innerHTML = `<div class="no-results" style="grid-column:1/-1"><h3>Aucun produit dans cette catégorie</h3><p>Revenez bientôt, de nouveaux articles arrivent régulièrement.</p></div>`;
      return;
    }

    grid.innerHTML = products.map(p => `
      <div class="product-card">
        <a href="product.html?id=${p.id}">
          <div class="product-img">
            ${p.badge ? `<span class="badge ${p.badgeType}">${p.badge}</span>` : ''}
            <button class="btn-wishlist" title="Favoris" onclick="event.preventDefault()">♡</button>
            <img src="${p.image}" alt="${p.name}" loading="lazy">
          </div>
          <div class="product-body">
            <div class="product-subcat">${p.subcat}</div>
            <div class="product-name">${p.name}</div>
          </div>
        </a>
        <div class="product-footer">
          <span class="product-price">${formatPrice(p.price)}</span>
          <button class="btn-add-cart" onclick="addToCart(${p.id})" title="Ajouter au panier">+</button>
        </div>
      </div>
    `).join('');
  }
</script>
</body>
</html>
